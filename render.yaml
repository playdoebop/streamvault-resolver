services:
  - type: web
    name: streamvault-resolver
    runtime: node
    buildCommand: |
      curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
      chmod +x /usr/local/bin/yt-dlp
      npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: TMDB_API_KEY
        sync: false
      - key: LOG_LEVEL
        value: info
    plan: free
